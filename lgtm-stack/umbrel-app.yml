manifestVersion: 1
id: lgtm-stack
name: LGTM Stack
tagline: Full Grafana observability stack — logs, traces, and metrics
icon: https://raw.githubusercontent.com/grafana/grafana/main/public/img/grafana_icon.svg
category: Monitoring
version: "1.0.4"
port: 3000
description: >-
  LGTM Stack bundles the complete Grafana observability suite into a single
  Umbrel app:


  - **Loki** — Log aggregation system
  - **Grafana** — Dashboards and visualization
  - **Tempo** — Distributed tracing backend
  - **Mimir** — Long-term metrics storage
  - **Infinity Datasource** — Query REST APIs, JSON, CSV, XML directly


  Includes **Grafana Alloy**, a lightweight OpenTelemetry collector
  that automatically scrapes logs from all Docker containers on your Umbrel
  host (including Komodo DinD containers) and ships them to Loki.


  **New:** Infinity Datasource plugin allows querying REST APIs, JSON endpoints,
  CSV files, XML feeds, and GraphQL APIs directly from Grafana dashboards.


  Send application traces and metrics to OpenTelemetry receivers on ports 
  4317 (gRPC) and 4318 (HTTP).

developer: Grafana Labs
website: https://grafana.com
submitter: crislerwintler
submission: https://github.com/crislerwintler/umbrel-app-store
repo: https://github.com/grafana/docker-otel-lgtm
support: https://community.grafana.com
gallery:
  - https://raw.githubusercontent.com/crislerwintler/umbrel-app-store/master/lgtm-stack/images/lgtm_1.png
  - https://raw.githubusercontent.com/crislerwintler/umbrel-app-store/master/lgtm-stack/images/lgtm_2.png
  - https://raw.githubusercontent.com/crislerwintler/umbrel-app-store/master/lgtm-stack/images/lgtm_3.png
releaseNotes: >-
  v1.0.4: Added Infinity Datasource plugin for REST API and JSON querying.
  v1.0.3: Disabled anonymous access in Grafana. Authentication now required.
  v1.0.2: Added support for scraping logs from Komodo DinD containers.
dependencies: []
path: ""
defaultUsername: "admin"
defaultPassword: "admin"
