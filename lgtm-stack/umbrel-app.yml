manifestVersion: 1
id: lgtm-stack
name: LGTM Stack
tagline: Full Grafana observability stack — logs, traces, and metrics
icon: https://raw.githubusercontent.com/grafana/grafana/main/public/img/grafana_icon.svg
category: Monitoring
version: "1.0.0"
port: 3001
description: >-
  LGTM Stack bundles the complete Grafana observability suite into a single
  Umbrel app:


  - **Loki** — Log aggregation system
  - **Grafana** — Dashboards and visualization
  - **Tempo** — Distributed tracing backend
  - **Mimir** — Long-term metrics storage


  It also includes **Grafana Alloy**, a lightweight OpenTelemetry collector
  that automatically scrapes logs from all Docker containers on your Umbrel
  host (including Komodo DinD containers) and ships them to Loki.


  You can also send your own application traces and metrics directly to the
  built-in OpenTelemetry receivers on ports 4317 (gRPC) and 4318 (HTTP).

developer: Grafana Labs
