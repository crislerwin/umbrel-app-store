version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lgtm-stack_lgtm_1
      APP_PORT: 3000

  # --- Service 2: The Backend (Loki, Grafana, Tempo, Mimir) ---
  lgtm:
    image: grafana/otel-lgtm:latest
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=${APP_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${APP_PASSWORD:-admin}
    ports:
      - "4317:4317" # OTLP gRPC Receiver
      - "4318:4318" # OTLP HTTP Receiver
    volumes:
      - ${APP_DATA_DIR}/data/lgtm:/data
    restart: always

  # --- Service 3: The Collector (Scrapes Docker) ---
  alloy:
    image: grafana/alloy:latest
    user: "0:0"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - $PWD/alloy.config:/etc/alloy/config.alloy:ro
      # Host Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Komodo DinD Docker socket
      - /home/umbrel/umbrel/app-data/komodo/data/docker/docker.sock:/komodo-docker/docker.sock:ro
    depends_on:
      - lgtm
    restart: always
