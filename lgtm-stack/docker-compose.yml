version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: lgtm-stack_lgtm_1
      APP_PORT: 3000
    networks:
      - umbrel_main_network

  # --- Service 2: The Backend (Loki, Grafana, Tempo, Mimir) ---
  lgtm:
    image: grafana/otel-lgtm:latest
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    ports:
      - "4317:4317" # OTLP gRPC Receiver
      - "4318:4318" # OTLP HTTP Receiver
    volumes:
      - ${APP_DATA_DIR}/data/lgtm:/data
      - ${APP_DATA_DIR}/data/grafana-plugins:/var/lib/grafana/plugins
    networks:
      - umbrel_main_network
      - external_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always

  # --- Service 3: The Collector (Scrapes Docker) ---
  alloy:
    image: grafana/alloy:latest
    user: "0:0"
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        exec alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      # Host Docker socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ALLOY_CONFIG: |
        // --- Host Docker Socket ---
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.lgtm.receiver]
        }
        
        // --- Write to Loki ---
        loki.write "lgtm" {
          endpoint {
            url = "http://lgtm:3100/loki/api/v1/push"
          }
        }
    networks:
      - umbrel_main_network
      - external_network
    depends_on:
      - lgtm
    restart: always

networks:
  umbrel_main_network:
    external: true
  external_network:
    driver: bridge
