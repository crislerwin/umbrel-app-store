version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: lgtm-stack_lgtm_1
      APP_PORT: 3000

  # --- Service 1: PostgreSQL (Grafana database) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grafana
      POSTGRES_USER: grafana
      POSTGRES_PASSWORD: grafana
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana -d grafana"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Service 2: The Backend (Loki, Grafana, Tempo, Mimir) ---
  lgtm:
    image: grafana/otel-lgtm:latest
    environment:
      - ENABLE_LOGS_GRAFANA=true
      # PostgreSQL database for Grafana (replaces default SQLite)
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=grafana
      - GF_DATABASE_PASSWORD=grafana
      - GF_DATABASE_SSL_MODE=disable
    ports:
      - "4317:4317"   # OTLP gRPC Receiver
      - "4318:4318"   # OTLP HTTP Receiver
    volumes:
      - ${APP_DATA_DIR}/data/lgtm:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # --- Service 3: The Collector (Scrapes Docker) ---
  alloy:
    image: grafana/alloy:latest
    environment:
      ALLOY_CONFIG: |
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.lgtm.receiver]
        }
        loki.write "lgtm" {
          endpoint {
            url = "http://lgtm:3100/loki/api/v1/push"
          }
        }
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        /bin/alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      # Host Docker socket (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - lgtm
    restart: always

