version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: lgtm
      APP_PORT: 3000

  # --- Service 2: The Backend (Loki, Grafana, Tempo, Mimir) ---
  lgtm:
    image: grafana/otel-lgtm:latest
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - GF_SERVER_HTTP_PORT=3000
    ports:
      - "4317:4317" # OTLP gRPC Receiver
      - "4318:4318" # OTLP HTTP Receiver
    volumes:
      - ${APP_DATA_DIR}/data/lgtm:/data
    restart: always

  # --- Service 3: The Collector (Scrapes Docker) ---
  alloy:
    image: grafana/alloy:latest
    environment:
      ALLOY_CONFIG: |
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.lgtm.receiver]
        }
        loki.write "lgtm" {
          endpoint {
            url = "http://lgtm:3100/loki/api/v1/push"
          }
        }
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        /bin/alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      # Host Docker socket (required)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - lgtm
    restart: always
