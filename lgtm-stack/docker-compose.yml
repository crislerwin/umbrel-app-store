version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: localhost
      APP_PORT: 3000
    network_mode: host

  lgtm:
    image: grafana/otel-lgtm:latest
    environment:
      - ENABLE_LOGS_GRAFANA=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3010:3000"
    volumes:
      - ${APP_DATA_DIR}/data/lgtm:/data
      - ${APP_DATA_DIR}/data/grafana-plugins:/var/lib/grafana/plugins
    network_mode: host
    restart: always

  alloy:
    image: grafana/alloy:latest
    user: "0:0"
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        exec alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      ALLOY_CONFIG: |
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.lgtm.receiver]
        }
        loki.write "lgtm" {
          endpoint {
            url = "http://localhost:3100/loki/api/v1/push"
          }
        }
    network_mode: host
    restart: always
