# Local override – strips the Umbrel-injected app_proxy so docker compose works
# outside the Umbrel OS. The real docker-compose.yml stays untouched.
services:
  app_proxy:
    image: traefik:v2.10
    command: ["--help"]        # no-op; Umbrel replaces this at runtime
    environment:
      APP_HOST: lgtm-stack_lgtm_1
      APP_PORT: 3000
