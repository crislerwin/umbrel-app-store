version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: loki
      APP_PORT: 3100

  loki:
    image: grafana/loki:latest
    volumes:
      - ${APP_DATA_DIR}/data/loki:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: always

  alloy:
    image: grafana/alloy:latest
    environment:
      ALLOY_CONFIG: |
        discovery.docker "host" {
          host = "unix:///var/run/docker.sock"
        }
        discovery.relabel "host_containers" {
          targets = discovery.docker.host.targets
          rule {
            source_labels = ["__meta_docker_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_docker_container_image"]
            target_label  = "image"
          }
          rule {
            target_label = "source"
            replacement  = "host-docker"
          }
        }
        loki.source.docker "host" {
          host       = "unix:///var/run/docker.sock"
          targets    = discovery.relabel.host_containers.output
          forward_to = [loki.write.loki.receiver]
        }
        loki.write "loki" {
          endpoint {
            url = "http://loki:3100/loki/api/v1/push"
          }
        }
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$$ALLOY_CONFIG" > /tmp/config.alloy
        /bin/alloy run --server.http.listen-addr=0.0.0.0:12345 /tmp/config.alloy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: always
